<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>UML – RPG</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a14;--panel:#10101e;--border:#2a2a5c;--accent:#7c6dff;--accent2:#c4a8ff;--gold:#ffd700;--text:#d0cff5;--muted:#5a5880;--enum-bg:#140a1e;--enum-border:#6a2a9c;--header-bg:#181830;--shadow:rgba(124,109,255,0.22);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'Share Tech Mono',monospace;color:var(--text);min-height:100vh;overflow:auto;background-image:radial-gradient(ellipse at 20% 10%,rgba(124,109,255,.1) 0%,transparent 45%),radial-gradient(ellipse at 80% 90%,rgba(201,78,255,.07) 0%,transparent 40%),repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(42,42,92,.12) 39px,rgba(42,42,92,.12) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(42,42,92,.12) 39px,rgba(42,42,92,.12) 40px);}
h1{font-family:'Cinzel',serif;font-size:2.2rem;color:var(--gold);text-align:center;letter-spacing:4px;padding:28px 0 4px;text-shadow:0 0 40px rgba(255,215,0,.5);}
.subtitle{text-align:center;color:var(--muted);font-size:.78rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;}
.note{background:rgba(124,109,255,.08);border:1px solid var(--border);border-left:3px solid var(--accent);padding:8px 18px;font-size:.76rem;color:var(--muted);max-width:640px;margin:0 auto 6px;text-align:center;}
.hint{text-align:center;font-size:.71rem;color:var(--muted);padding-bottom:10px;letter-spacing:1px;}
#canvas{position:relative;width:100%;min-height:820px;}
svg#arrows{position:absolute;top:0;left:0;pointer-events:none;overflow:visible;}
.node{position:absolute;border:1px solid var(--border);background:var(--panel);min-width:210px;box-shadow:0 0 20px var(--shadow);cursor:grab;user-select:none;transition:box-shadow .15s;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%);}
.node:hover{box-shadow:0 0 36px var(--shadow);}
.node.dragging{cursor:grabbing;z-index:9999;box-shadow:0 0 50px var(--shadow);}
.node.abstract{border-color:var(--accent);border-style:dashed;}
.node.enum-cls{border-color:var(--enum-border);background:var(--enum-bg);}
.cls-header{background:var(--header-bg);padding:8px 13px;border-bottom:1px solid var(--border);text-align:center;position:relative;}
.cls-header::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);}
.node.abstract .cls-header::before{background:linear-gradient(90deg,transparent,var(--accent2),transparent);}
.node.enum-cls .cls-header::before{background:linear-gradient(90deg,transparent,#c94eff,transparent);}
.stereotype{font-size:.65rem;color:var(--muted);display:block;letter-spacing:1px;}
.cls-name{font-family:'Cinzel',serif;font-weight:700;font-size:.9rem;color:var(--accent2);letter-spacing:1px;}
.node.abstract .cls-name{font-style:italic;}
.node.enum-cls .cls-name{color:#c94eff;}
.cls-section{padding:5px 13px;border-bottom:1px solid rgba(42,42,92,.5);font-size:.73rem;line-height:1.8;}
.cls-section:last-child{border-bottom:none;}
.vis{color:var(--muted);}
.type{color:#48b8ff;}
.ret{color:var(--gold);}
.ev{color:#c94eff;font-weight:700;letter-spacing:1px;}
.badge{display:inline-block;background:rgba(124,109,255,.15);border:1px solid var(--accent);border-radius:2px;padding:0 4px;font-size:.6rem;color:var(--accent);margin-left:3px;}
.legend{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;padding:12px 0 18px;font-size:.71rem;color:var(--muted);}
.legend-item{display:flex;align-items:center;gap:5px;}
</style>
</head>
<body>
<h1>⚔️ SISTEMA RPG</h1>
<p class="subtitle">Diagrama UML · Java OOP · Herencia &amp; Enums</p>
<div class="note">🎮 <strong>Ejercicio:</strong> Implementa el sistema RPG en Java. Cada clase de personaje tiene comportamientos únicos.</div>
<p class="hint">✦ Arrastra las cajas para reorganizar el diagrama</p>
<div id="canvas"><svg id="arrows"></svg></div>
<div class="legend">
  <div class="legend-item"><svg width="34" height="13"><line x1="0" y1="6" x2="22" y2="6" stroke="#7c6dff" stroke-width="2"/><polygon points="16,1 28,6 16,11" fill="#0a0a14" stroke="#7c6dff" stroke-width="1.5"/></svg>Herencia</div>
  <div class="legend-item"><span style="color:#48b8ff">azul</span>=tipo</div>
  <div class="legend-item"><span style="color:#ffd700">dorado</span>=retorno</div>
  <div class="legend-item"><span style="font-style:italic;color:#c4a8ff">italic</span>=abstracto</div>
</div>
<script>
const NODES=[
  {id:'personaje',x:340,y:20,cls:'abstract',st:'«abstract»',name:'Personaje',secs:[
    ['f:- nombre:String','f:- nivel:int','f:- vidaMaxima:int','f:- vidaActual:int','f:- mana:int','f:- experiencia:int'],
    ['m:+ Personaje(String,int,int,int)','m:+ getNombre():String','m:+ getNivel():int','m:+ estaVivo():boolean','m:+ recibirDano(int):void','m:+ subirNivel():void','m:+ <i>atacar(Personaje)</i>:int:abstract','m:+ <i>habilidadEspecial()</i>:String:abstract','m:+ toString():String']
  ]},
  {id:'guerrero',x:20,y:330,cls:'',name:'Guerrero',secs:[
    ['f:- fuerza:int','f:- armadura:int','f:- rabia:int'],
    ['m:+ Guerrero(String,int)','m:+ atacar(Personaje):int','m:+ habilidadEspecial():String','m:+ golpeAturdidor():void','m:+ defender():int']
  ]},
  {id:'mago',x:245,y:330,cls:'',name:'Mago',secs:[
    ['f:- inteligencia:int','f:- manaMaximo:int','f:- hechizos:String[]'],
    ['m:+ Mago(String,int)','m:+ atacar(Personaje):int','m:+ habilidadEspecial():String','m:+ lanzarHechizo(String):void','m:+ recargarMana():void']
  ]},
  {id:'arquero',x:470,y:330,cls:'',name:'Arquero',secs:[
    ['f:- destreza:int','f:- flechas:int','f:- critico:double'],
    ['m:+ Arquero(String,int)','m:+ atacar(Personaje):int','m:+ habilidadEspecial():String','m:+ disparar():boolean','m:+ recargarFlechas(int):void']
  ]},
  {id:'paladin',x:690,y:330,cls:'',name:'Paladin',secs:[
    ['f:- fe:int','f:- puntosDeAura:int'],
    ['m:+ Paladin(String,int)','m:+ atacar(Personaje):int','m:+ habilidadEspecial():String','m:+ curar(Personaje):void','m:+ consagrar():String']
  ]},
  {id:'objeto',x:100,y:620,cls:'',name:'Objeto',secs:[
    ['f:- nombre:String','f:- rareza:Rareza','f:- valor:int','f:- descripcion:String'],
    ['m:+ Objeto(String,Rareza,int,String)','m:+ getRareza():Rareza','m:+ getValor():int','m:+ usar():String']
  ]},
  {id:'rareza',x:370,y:620,cls:'enum-cls',st:'«enum»',name:'Rareza',secs:[
    ['e:COMUN','e:POCO_COMUN','e:RARO','e:EPICO','e:LEGENDARIO','e:DIVINO'],
    ['f:- multiplicadorDrop:double','f:- color:String'],
    ['m:+ getMultiplicador():double','m:+ getColor():String']
  ]},
  {id:'tipoclase',x:650,y:620,cls:'enum-cls',st:'«enum»',name:'TipoClase',secs:[
    ['e:TANQUE','e:DAÑO','e:SOPORTE','e:CONTROL'],
    ['f:- rolDescripcion:String'],
    ['m:+ getRol():String']
  ]}
];
const EDGES=[
  ['personaje','guerrero'],['personaje','mago'],['personaje','arquero'],['personaje','paladin']
];
const ARROW_COLOR='#7c6dff';
const BG='#0a0a14';

const canvas=document.getElementById('canvas');
const svgEl=document.getElementById('arrows');
const pos={};

function renderItem(s){
  const type=s[0];const rest=s.slice(2);
  if(type==='e') return `<div class="ev">${rest}</div>`;
  if(type==='f'){
    const parts=rest.split(':');
    const [vis,...name]=parts[0].split(' ');
    const t=parts[1]||'';
    return `<div><span class="vis">${vis} </span>${name.join(' ')}${t?`<span class="vis"> : </span><span class="type">${t}</span>`:''}</div>`;
  }
  const parts=rest.split(':');
  const sig=parts[0];const ret=parts[1]||'';const badge=parts[2]||'';
  return `<div>${sig}${ret?`<span class="vis"> : </span><span class="ret">${ret}</span>`:''}${badge?`<span class="badge">${badge}</span>`:''}</div>`;
}

NODES.forEach(n=>{
  const el=document.createElement('div');
  el.className='node'+(n.cls?' '+n.cls:'');
  el.id='n-'+n.id;
  el.style.left=n.x+'px'; el.style.top=n.y+'px';
  pos[n.id]={x:n.x,y:n.y};
  let h=`<div class="cls-header">${n.st?`<span class="stereotype">${n.st}</span>`:''}<span class="cls-name">${n.name}</span></div>`;
  n.secs.forEach(sec=>{h+=`<div class="cls-section">${sec.map(renderItem).join('')}</div>`;});
  el.innerHTML=h;
  canvas.appendChild(el);
});

let drag=null,ox=0,oy=0;
function startDrag(e,id,cx,cy){
  drag=id;
  const el=document.getElementById('n-'+id);
  const r=el.getBoundingClientRect();
  ox=cx-r.left; oy=cy-r.top;
  el.classList.add('dragging'); e.preventDefault();
}
function moveDrag(cx,cy){
  if(!drag)return;
  const cr=canvas.getBoundingClientRect();
  const x=cx-cr.left-ox; const y=cy-cr.top-oy;
  pos[drag]={x,y};
  const el=document.getElementById('n-'+drag);
  el.style.left=x+'px'; el.style.top=y+'px';
  resize(); drawArrows();
}
function endDrag(){if(drag){document.getElementById('n-'+drag).classList.remove('dragging');drag=null;}}

Object.keys(pos).forEach(id=>{
  const el=document.getElementById('n-'+id);
  el.addEventListener('mousedown',e=>{if(e.button===0)startDrag(e,id,e.clientX,e.clientY);});
  el.addEventListener('touchstart',e=>{const t=e.touches[0];startDrag(e,id,t.clientX,t.clientY);},{passive:false});
});
document.addEventListener('mousemove',e=>moveDrag(e.clientX,e.clientY));
document.addEventListener('mouseup',endDrag);
document.addEventListener('touchmove',e=>{const t=e.touches[0];moveDrag(t.clientX,t.clientY);},{passive:false});
document.addEventListener('touchend',endDrag);

function resize(){
  let mx=800,my=600;
  Object.keys(pos).forEach(id=>{
    const el=document.getElementById('n-'+id);
    mx=Math.max(mx,pos[id].x+el.offsetWidth+60);
    my=Math.max(my,pos[id].y+el.offsetHeight+60);
  });
  canvas.style.minWidth=mx+'px'; canvas.style.minHeight=my+'px';
  svgEl.setAttribute('width',mx); svgEl.setAttribute('height',my);
}

function drawArrows(){
  svgEl.innerHTML='';
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  const mk=document.createElementNS('http://www.w3.org/2000/svg','marker');
  mk.setAttribute('id','arr'); mk.setAttribute('markerWidth','10');
  mk.setAttribute('markerHeight','10'); mk.setAttribute('refX','8');
  mk.setAttribute('refY','5'); mk.setAttribute('orient','auto');
  const pg=document.createElementNS('http://www.w3.org/2000/svg','polygon');
  pg.setAttribute('points','0,1 9,5 0,9'); pg.setAttribute('fill',BG);
  pg.setAttribute('stroke',ARROW_COLOR); pg.setAttribute('stroke-width','1.5');
  mk.appendChild(pg); defs.appendChild(mk); svgEl.appendChild(defs);
  EDGES.forEach(([fid,tid])=>{
    const fe=document.getElementById('n-'+fid);
    const te=document.getElementById('n-'+tid);
    const fp=pos[fid];const tp=pos[tid];
    const fcx=fp.x+fe.offsetWidth/2, fbot=fp.y+fe.offsetHeight;
    const tcx=tp.x+te.offsetWidth/2, ttop=tp.y;
    const my=(fbot+ttop)/2;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${fcx},${fbot} C${fcx},${my} ${tcx},${my} ${tcx},${ttop}`);
    path.setAttribute('stroke',ARROW_COLOR); path.setAttribute('stroke-width','2');
    path.setAttribute('fill','none'); path.setAttribute('marker-end','url(#arr)');
    svgEl.appendChild(path);
  });
}
setTimeout(()=>{resize();drawArrows();},120);
window.addEventListener('resize',()=>{resize();drawArrows();});
</script>
</body>
</html>
