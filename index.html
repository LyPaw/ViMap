<style>
/* ── RESET & BASE ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #060910;
  --surface:   #0c1018;
  --surface2:  #111827;
  --border:    #1a2233;
  --border2:   #243044;
  --accent:    #3b82f6;
  --accent2:   #6366f1;
  --accent3:   #22d3ee;
  --text:      #e2e8f0;
  --text2:     #94a3b8;
  --text3:     #475569;
  --green:     #10b981;
  --yellow:    #f59e0b;
  --red:       #ef4444;
  --sidebar-w: 280px;
  --header-h:  52px;
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
}

/* ── SCROLLBAR ────────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* ── HEADER ───────────────────────────────────────────────── */
header {
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 18px;
  gap: 14px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.logo-mark {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.1rem;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent3), var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header-sep { flex: 1; }

.breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.7rem;
  color: var(--text3);
}
.breadcrumb span { color: var(--text2); }
.breadcrumb .sep { color: var(--text3); }

.header-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
}

/* ── MAIN LAYOUT ──────────────────────────────────────────── */
.app {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── SIDEBAR ──────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}

.sidebar-header {
  padding: 14px 14px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.search-box {
  position: relative;
}

.search-box input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 6px 10px 6px 30px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  outline: none;
  transition: border-color 0.2s;
}
.search-box input::placeholder { color: var(--text3); }
.search-box input:focus { border-color: var(--accent); }

.search-icon {
  position: absolute;
  left: 9px; top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 0.75rem;
  pointer-events: none;
}

.sidebar-tree {
  flex: 1;
  overflow-y: auto;
  padding: 8px 6px 16px;
}

/* ── TREE NODES ───────────────────────────────────────────── */
.tree-item {
  position: relative;
}

.tree-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 8px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.72rem;
  color: var(--text2);
  transition: background 0.15s, color 0.15s;
  user-select: none;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tree-row:hover { background: var(--surface2); color: var(--text); }
.tree-row.active { background: rgba(59,130,246,0.15); color: var(--accent3); }

.tree-arrow {
  font-size: 0.55rem;
  color: var(--text3);
  transition: transform 0.2s;
  flex-shrink: 0;
  width: 10px;
}
.tree-item.open > .tree-row .tree-arrow { transform: rotate(90deg); }

.tree-icon { flex-shrink: 0; font-size: 0.8rem; }
.tree-label { overflow: hidden; text-overflow: ellipsis; }

.tree-children {
  display: none;
  padding-left: 16px;
  position: relative;
}
.tree-children::before {
  content: '';
  position: absolute;
  left: 14px; top: 0; bottom: 0;
  width: 1px;
  background: var(--border);
}
.tree-item.open > .tree-children { display: block; }

/* File badges */
.file-ext {
  margin-left: auto;
  font-size: 0.58rem;
  padding: 1px 5px;
  border-radius: 3px;
  flex-shrink: 0;
  font-weight: 500;
}
.ext-java  { background: rgba(239,68,68,0.15);   color: #f87171; }
.ext-md    { background: rgba(99,102,241,0.15);   color: #a5b4fc; }
.ext-pdf   { background: rgba(245,158,11,0.15);   color: #fbbf24; }
.ext-html  { background: rgba(34,211,238,0.15);   color: #67e8f9; }

/* ── VIEWER ───────────────────────────────────────────────── */
.viewer {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

/* Tab bar */
.tab-bar {
  height: 38px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  padding: 0 0 0 16px;
  flex-shrink: 0;
  gap: 2px;
  overflow-x: auto;
}

.tab {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 6px 14px 7px;
  font-size: 0.68rem;
  color: var(--text3);
  cursor: pointer;
  border-radius: 6px 6px 0 0;
  border: 1px solid transparent;
  border-bottom: none;
  white-space: nowrap;
  transition: all 0.15s;
  position: relative;
  bottom: 0;
}
.tab:hover { color: var(--text2); background: var(--surface2); }
.tab.active {
  color: var(--text);
  background: var(--bg);
  border-color: var(--border);
  border-bottom-color: var(--bg);
}
.tab-close {
  color: var(--text3);
  font-size: 0.7rem;
  line-height: 1;
  padding: 1px 2px;
  border-radius: 3px;
  transition: background 0.1s, color 0.1s;
}
.tab-close:hover { background: rgba(239,68,68,0.2); color: var(--red); }

/* Welcome / empty state */
.welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  color: var(--text3);
}
.welcome-glyph {
  font-size: 3rem;
  opacity: 0.3;
}
.welcome h2 {
  font-family: 'Syne', sans-serif;
  font-size: 1.1rem;
  color: var(--text3);
  font-weight: 600;
}
.welcome p { font-size: 0.72rem; color: var(--text3); }

/* Content pane */
.content-pane {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Code view */
.code-wrap {
  flex: 1;
  overflow: auto;
  padding: 0;
}

.code-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.code-filename {
  font-family: 'Syne', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text);
}

.code-meta { font-size: 0.65rem; color: var(--text3); display: flex; gap: 12px; }
.code-meta span { display: flex; align-items: center; gap: 4px; }

pre.code-block {
  background: transparent;
  padding: 20px 24px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  line-height: 1.7;
  overflow-x: auto;
  white-space: pre;
  counter-reset: line;
}

/* Line numbers */
.line {
  display: flex;
  gap: 16px;
}
.ln {
  color: var(--text3);
  font-size: 0.68rem;
  min-width: 32px;
  text-align: right;
  flex-shrink: 0;
  user-select: none;
  padding-top: 1px;
}
.lc { flex: 1; }

/* Syntax colors */
.kw  { color: #60a5fa; font-weight: 500; }
.cls { color: #34d399; }
.str { color: #fb923c; }
.cmt { color: #4b5563; font-style: italic; }
.num { color: #a78bfa; }
.ann { color: #f472b6; }

/* Markdown */
.md-wrap {
  flex: 1;
  overflow: auto;
  padding: 32px 40px;
  max-width: 860px;
}

.md-wrap h1 { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; color: var(--text); margin-bottom: 18px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.md-wrap h2 { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 600; color: var(--accent3); margin: 28px 0 12px; }
.md-wrap h3 { font-family: 'Syne', sans-serif; font-size: 1rem; color: var(--accent); margin: 20px 0 8px; }
.md-wrap p  { color: var(--text2); line-height: 1.75; margin-bottom: 14px; font-size: 0.85rem; }
.md-wrap ul, .md-wrap ol { color: var(--text2); padding-left: 20px; margin-bottom: 14px; font-size: 0.83rem; }
.md-wrap li { line-height: 1.7; margin-bottom: 4px; }
.md-wrap code { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; color: var(--accent3); font-size: 0.8rem; }
.md-wrap pre { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; overflow-x: auto; margin-bottom: 18px; }
.md-wrap pre code { background: none; border: none; padding: 0; color: var(--text); font-size: 0.78rem; }
.md-wrap blockquote { border-left: 3px solid var(--accent2); padding-left: 16px; color: var(--text3); margin: 16px 0; font-style: italic; }
.md-wrap table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 0.8rem; }
.md-wrap th { background: var(--surface2); color: var(--text); padding: 8px 12px; border: 1px solid var(--border2); text-align: left; }
.md-wrap td { padding: 7px 12px; border: 1px solid var(--border); color: var(--text2); }
.md-wrap tr:hover td { background: rgba(255,255,255,0.02); }

/* PDF / HTML iframes */
.frame-wrap {
  flex: 1;
  background: var(--bg);
  display: flex;
  flex-direction: column;
}
.frame-wrap iframe {
  flex: 1;
  border: none;
  width: 100%;
  height: 100%;
}

/* Loading spinner */
.loading {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: var(--text3);
  font-size: 0.75rem;
}
.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Status bar */
.statusbar {
  height: 24px;
  background: var(--accent);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 20px;
  font-size: 0.62rem;
  color: rgba(255,255,255,0.85);
  flex-shrink: 0;
}
.statusbar .s-item { display: flex; align-items: center; gap: 5px; }
.statusbar .s-sep  { color: rgba(255,255,255,0.3); }
.statusbar .s-right { margin-left: auto; }

/* Sidebar resize handle */
.resize-handle {
  width: 4px;
  background: transparent;
  cursor: col-resize;
  flex-shrink: 0;
  transition: background 0.2s;
}
.resize-handle:hover { background: var(--accent); }

</style>
</head>

/* ═══════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════ */
function extOf(name) {
  return name.split('.').pop().toLowerCase();
}

function extBadge(name) {
  const e = extOf(name);
  const map = { java:'ext-java', md:'ext-md', pdf:'ext-pdf', html:'ext-html' };
  const cls = map[e] || '';
  return cls ? `<span class="file-ext ${cls}">.${e}</span>` : '';
}

function langIcon(name) {
  const e = extOf(name);
  const icons = { java:'☕', md:'📝', pdf:'📄', html:'🌐' };
  return icons[e] || '📄';
}

/* ═══════════════════════════════════════════════════════════
   BUILD SIDEBAR TREE
═══════════════════════════════════════════════════════════ */
const treeRoot = document.getElementById('tree-root');

function buildTree(data, container, depth = 0) {
  for (const key in data) {
    const val = data[key];
    const isFiles = Array.isArray(val);

    const item = document.createElement('div');
    item.className = 'tree-item';

    const row = document.createElement('div');
    row.className = 'tree-row';
    row.style.paddingLeft = (8 + depth * 12) + 'px';

    if (isFiles) {
      // Folder with files
      row.innerHTML = `
        <span class="tree-arrow">▶</span>
        <span class="tree-icon">📂</span>
        <span class="tree-label">${key}</span>
      `;
      const children = document.createElement('div');
      children.className = 'tree-children';

      val.forEach(file => {
        const fItem = document.createElement('div');
        fItem.className = 'tree-item';

        const fRow = document.createElement('div');
        fRow.className = 'tree-row';
        fRow.style.paddingLeft = (8 + (depth + 1) * 12) + 'px';
        fRow.innerHTML = `
          <span class="tree-arrow" style="visibility:hidden">▶</span>
          <span class="tree-icon">${langIcon(file.name)}</span>
          <span class="tree-label">${file.name}</span>
          ${extBadge(file.name)}
        `;
        fRow.addEventListener('click', e => {
          e.stopPropagation();
          openFile(file);
          document.querySelectorAll('.tree-row').forEach(r => r.classList.remove('active'));
          fRow.classList.add('active');
          // breadcrumb
          document.getElementById('breadcrumb').innerHTML =
            `<span>${key}</span><span class="sep">›</span><span>${file.name}</span>`;
        });

        fItem.appendChild(fRow);
        children.appendChild(fItem);
      });

      row.addEventListener('click', e => { e.stopPropagation(); item.classList.toggle('open'); });
      item.appendChild(row);
      item.appendChild(children);

    } else {
      // Nested folder
      row.innerHTML = `
        <span class="tree-arrow">▶</span>
        <span class="tree-icon">📁</span>
        <span class="tree-label">${key}</span>
      `;
      const children = document.createElement('div');
      children.className = 'tree-children';
      buildTree(val, children, depth + 1);

      row.addEventListener('click', e => { e.stopPropagation(); item.classList.toggle('open'); });
      item.appendChild(row);
      item.appendChild(children);
    }

    container.appendChild(item);
  }
}

buildTree(fileTree, treeRoot);

/* ═══════════════════════════════════════════════════════════
   TABS
═══════════════════════════════════════════════════════════ */
const tabBar     = document.getElementById('tab-bar');
const contentPane = document.getElementById('content-pane');
const welcome    = document.getElementById('welcome-screen');

let tabs = [];       // { file, tabEl, contentEl }
let activeTab = null;

function openFile(file) {
  // Check if already open
  const existing = tabs.find(t => t.file.url === file.url);
  if (existing) {
    activateTab(existing);
    return;
  }

  // Hide welcome
  welcome.style.display = 'none';

  // Create tab
  const tabEl = document.createElement('div');
  tabEl.className = 'tab';
  tabEl.innerHTML = `
    <span>${langIcon(file.name)}</span>
    <span>${file.name}</span>
    <span class="tab-close" title="cerrar">✕</span>
  `;

  // Create content
  const contentEl = document.createElement('div');
  contentEl.className = 'content-pane';
  contentEl.style.display = 'none';

  const entry = { file, tabEl, contentEl };
  tabs.push(entry);

  tabEl.addEventListener('click', e => {
    if (e.target.classList.contains('tab-close')) {
      closeTab(entry);
    } else {
      activateTab(entry);
    }
  });

  tabBar.appendChild(tabEl);
  contentPane.parentNode.insertBefore(contentEl, contentPane.nextSibling);

  // Load content
  loadContent(file, contentEl);

  activateTab(entry);
}

function activateTab(entry) {
  if (activeTab) {
    activeTab.tabEl.classList.remove('active');
    activeTab.contentEl.style.display = 'none';
  }
  activeTab = entry;
  entry.tabEl.classList.add('active');
  entry.contentEl.style.display = 'flex';
  entry.contentEl.style.flexDirection = 'column';
  entry.contentEl.style.flex = '1';
  entry.contentEl.style.overflow = 'hidden';

  // Status
  document.getElementById('status-file').textContent = entry.file.name;
  document.getElementById('status-lang').textContent = extOf(entry.file.name).toUpperCase();
}

function closeTab(entry) {
  const idx = tabs.indexOf(entry);
  tabs.splice(idx, 1);
  entry.tabEl.remove();
  entry.contentEl.remove();

  if (activeTab === entry) {
    activeTab = null;
    if (tabs.length > 0) {
      activateTab(tabs[Math.max(0, idx - 1)]);
    } else {
      welcome.style.display = 'flex';
      document.getElementById('status-file').textContent = 'ViMap v2.0';
      document.getElementById('status-lang').textContent = 'listo';
      document.getElementById('status-lines').textContent = '—';
    }
  }
}

/* ═══════════════════════════════════════════════════════════
   LOAD CONTENT
═══════════════════════════════════════════════════════════ */
function showLoading(container) {
  container.innerHTML = `<div class="loading"><div class="spinner"></div>cargando...</div>`;
}

function loadContent(file, container) {
  const ext = extOf(file.name);
  showLoading(container);

  if (ext === 'md') {
    fetch(file.url)
      .then(r => r.text())
      .then(md => {
        const lines = md.split('\n').length;
        container.innerHTML = `<div class="md-wrap">${marked.parse(md)}</div>`;
        document.getElementById('status-lines').textContent = lines + ' líneas';
      })
      .catch(() => { container.innerHTML = `<div class="loading">⚠ No se pudo cargar el archivo</div>`; });
  }
  else if (ext === 'pdf') {
    const pdfUrl = `https://docs.google.com/gview?url=${encodeURIComponent(file.url.trim())}&embedded=true`;
    container.innerHTML = `
      <div class="code-header">
        <span class="code-filename">${file.name}</span>
        <span class="code-meta"><span>PDF document</span></span>
      </div>
      <div class="frame-wrap"><iframe src="${pdfUrl}" allowfullscreen></iframe></div>
    `;
  }
  else if (ext === 'html') {
    /* ── HTML files: fetch → srcdoc iframe (funciona aunque no esté en GitHub pages) ── */
    fetch(file.url.trim())
      .then(r => r.text())
      .then(html => {
        container.innerHTML = `
          <div class="code-header">
            <span class="code-filename">${file.name}</span>
            <div class="code-meta">
              <span>🌐 HTML preview</span>
              <span style="cursor:pointer;color:var(--accent3)" onclick="window.open('${file.url}','_blank')">↗ abrir raw</span>
            </div>
          </div>
          <div class="frame-wrap" id="frame-wrap-${btoa(file.name).replace(/=/g,'')}"></div>
        `;
        const wrap = container.querySelector('.frame-wrap');
        const iframe = document.createElement('iframe');
        iframe.style.flex = '1';
        iframe.style.width = '100%';
        iframe.style.border = 'none';
        iframe.srcdoc = html;     // ← clave: renderiza el HTML directamente
        iframe.sandbox = 'allow-scripts allow-same-origin allow-forms';
        wrap.appendChild(iframe);
        document.getElementById('status-lines').textContent = html.split('\n').length + ' líneas';
      })
      .catch(() => { container.innerHTML = `<div class="loading">⚠ No se pudo cargar el HTML (CORS). Usa una URL raw de GitHub.</div>`; });
  }
  else {
    // Java / any text → highlighted
    fetch(file.url.trim())
      .then(r => r.text())
      .then(text => {
        const lines = text.split('\n');
        document.getElementById('status-lines').textContent = lines.length + ' líneas';
        const highlighted = highlightJava(text);
        const linesHtml = highlighted.split('\n').map((l, i) =>
          `<div class="line"><span class="ln">${i + 1}</span><span class="lc">${l || ' '}</span></div>`
        ).join('');
        container.innerHTML = `
          <div class="code-header">
            <span class="code-filename">${file.name}</span>
            <div class="code-meta">
              <span>☕ Java</span>
              <span>${lines.length} líneas</span>
            </div>
          </div>
          <div class="code-wrap"><pre class="code-block">${linesHtml}</pre></div>
        `;
      })
      .catch(() => { container.innerHTML = `<div class="loading">⚠ No se pudo cargar el archivo</div>`; });
  }
}

/* ═══════════════════════════════════════════════════════════
   SYNTAX HIGHLIGHT (Java)
═══════════════════════════════════════════════════════════ */
function escapeHTML(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlightJava(code) {
  code = escapeHTML(code);
  const parts = [];

  code = code.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g, m => {
    parts.push({ t:'str', v:m }); return `@@S${parts.length-1}@@`;
  });
  code = code.replace(/(\/\/[^\n]*)/g, m => {
    parts.push({ t:'cmt', v:m }); return `@@C${parts.length-1}@@`;
  });
  code = code.replace(/(\/\*[\s\S]*?\*\/)/g, m => {
    parts.push({ t:'cmt', v:m }); return `@@C${parts.length-1}@@`;
  });
  code = code.replace(/(@[A-Za-z]+)/g, '<span class="ann">$1</span>');
  code = code.replace(/\b(class|public|private|protected|static|void|new|return|if|else|for|while|do|switch|case|break|continue|int|double|float|boolean|char|String|Set|HashSet|Map|HashMap|List|ArrayList|import|package|extends|implements|interface|abstract|final|try|catch|finally|throw|throws|this|super|instanceof|true|false|null|var|enum)\b/g,
    '<span class="kw">$1</span>');
  code = code.replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>');
  code = code.replace(/\b([A-Z][A-Za-z0-9_]*)\b/g, '<span class="cls">$1</span>');

  code = code.replace(/@@S(\d+)@@/g, (_,i) => `<span class="str">${parts[i].v}</span>`);
  code = code.replace(/@@C(\d+)@@/g, (_,i) => `<span class="cmt">${parts[i].v}</span>`);
  return code;
}

/* ═══════════════════════════════════════════════════════════
   SEARCH
═══════════════════════════════════════════════════════════ */
document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  document.querySelectorAll('.tree-item').forEach(item => {
    const label = item.querySelector('.tree-label');
    if (!label) return;
    const text = label.textContent.toLowerCase();
    if (!q) {
      item.style.display = '';
    } else {
      item.style.display = text.includes(q) ? '' : 'none';
      if (text.includes(q)) {
        // expand parents
        let p = item.parentElement;
        while (p && !p.id) {
          if (p.classList.contains('tree-children')) {
            p.parentElement.classList.add('open');
          }
          p = p.parentElement;
        }
      }
    }
  });
});

/* ═══════════════════════════════════════════════════════════
   SIDEBAR RESIZE
═══════════════════════════════════════════════════════════ */
const handle  = document.getElementById('resize-handle');
const sidebar = document.getElementById('sidebar-panel');
let resizing = false, startX = 0, startW = 0;

handle.addEventListener('mousedown', e => {
  resizing = true; startX = e.clientX; startW = sidebar.offsetWidth;
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
});
document.addEventListener('mousemove', e => {
  if (!resizing) return;
  const w = Math.max(160, Math.min(520, startW + e.clientX - startX));
  sidebar.style.width = w + 'px';
});
document.addEventListener('mouseup', () => {
  resizing = false;
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
});
</script>
