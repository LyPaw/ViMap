<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="author" content="LyPaw(Manuel Fuentes Cruz)">
<title>ViMap</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/LyPaw/ViMap/841576487e7cfcab6c0b5030f3e2b62e64a93995/Logo/icon.png">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #060910;
  --surface:   #0c1018;
  --surface2:  #111827;
  --border:    #1a2233;
  --border2:   #243044;
  --accent:    #3b82f6;
  --accent2:   #6366f1;
  --accent3:   #22d3ee;
  --text:      #e2e8f0;
  --text2:     #94a3b8;
  --text3:     #475569;
  --green:     #10b981;
  --yellow:    #f59e0b;
  --red:       #ef4444;
  --sidebar-w: 280px;
  --header-h:  52px;
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
}

/* ── SCROLLBAR ────────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* ── HEADER ───────────────────────────────────────────────── */
header {
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 18px;
  gap: 14px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.logo-mark {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.1rem;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent3), var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header-sep { flex: 1; }

.breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.7rem;
  color: var(--text3);
}
.breadcrumb span { color: var(--text2); }
.breadcrumb .sep { color: var(--text3); }

.header-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
}

/* ── MAIN LAYOUT ──────────────────────────────────────────── */
.app {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── SIDEBAR ──────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}

.sidebar-header {
  padding: 14px 14px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.search-box {
  position: relative;
}

.search-box input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 6px 10px 6px 30px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  outline: none;
  transition: border-color 0.2s;
}
.search-box input::placeholder { color: var(--text3); }
.search-box input:focus { border-color: var(--accent); }

.search-icon {
  position: absolute;
  left: 9px; top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 0.75rem;
  pointer-events: none;
}

.sidebar-tree {
  flex: 1;
  overflow-y: auto;
  padding: 8px 6px 16px;
}

/* ── TREE NODES ───────────────────────────────────────────── */
.tree-item {
  position: relative;
}

.tree-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 8px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.72rem;
  color: var(--text2);
  transition: background 0.15s, color 0.15s;
  user-select: none;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tree-row:hover { background: var(--surface2); color: var(--text); }
.tree-row.active { background: rgba(59,130,246,0.15); color: var(--accent3); }

.tree-arrow {
  font-size: 0.55rem;
  color: var(--text3);
  transition: transform 0.2s;
  flex-shrink: 0;
  width: 10px;
}
.tree-item.open > .tree-row .tree-arrow { transform: rotate(90deg); }

.tree-icon { flex-shrink: 0; font-size: 0.8rem; }
.tree-label { overflow: hidden; text-overflow: ellipsis; }

.tree-children {
  display: none;
  padding-left: 16px;
  position: relative;
}
.tree-children::before {
  content: '';
  position: absolute;
  left: 14px; top: 0; bottom: 0;
  width: 1px;
  background: var(--border);
}
.tree-item.open > .tree-children { display: block; }

/* File badges */
.file-ext {
  margin-left: auto;
  font-size: 0.58rem;
  padding: 1px 5px;
  border-radius: 3px;
  flex-shrink: 0;
  font-weight: 500;
}
.ext-java  { background: rgba(239,68,68,0.15);   color: #f87171; }
.ext-md    { background: rgba(99,102,241,0.15);   color: #a5b4fc; }
.ext-pdf   { background: rgba(245,158,11,0.15);   color: #fbbf24; }
.ext-html  { background: rgba(34,211,238,0.15);   color: #67e8f9; }

/* ── VIEWER ───────────────────────────────────────────────── */
.viewer {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

/* Tab bar */
.tab-bar {
  height: 38px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  padding: 0 0 0 16px;
  flex-shrink: 0;
  gap: 2px;
  overflow-x: auto;
}

.tab {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 6px 14px 7px;
  font-size: 0.68rem;
  color: var(--text3);
  cursor: pointer;
  border-radius: 6px 6px 0 0;
  border: 1px solid transparent;
  border-bottom: none;
  white-space: nowrap;
  transition: all 0.15s;
  position: relative;
  bottom: 0;
}
.tab:hover { color: var(--text2); background: var(--surface2); }
.tab.active {
  color: var(--text);
  background: var(--bg);
  border-color: var(--border);
  border-bottom-color: var(--bg);
}
.tab-close {
  color: var(--text3);
  font-size: 0.7rem;
  line-height: 1;
  padding: 1px 2px;
  border-radius: 3px;
  transition: background 0.1s, color 0.1s;
}
.tab-close:hover { background: rgba(239,68,68,0.2); color: var(--red); }

/* Welcome / empty state */
.welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  color: var(--text3);
}
.welcome-glyph {
  font-size: 3rem;
  opacity: 0.3;
}
.welcome h2 {
  font-family: 'Syne', sans-serif;
  font-size: 1.1rem;
  color: var(--text3);
  font-weight: 600;
}
.welcome p { font-size: 0.72rem; color: var(--text3); }

/* Content pane — single slot that fills the viewer */
.content-pane {
  flex: 1;
  min-height: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
/* Every direct child of content-pane should fill it */
.content-pane > div {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Code view */
.code-wrap {
  flex: 1;
  overflow: auto;
  padding: 0;
}

.code-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.code-filename {
  font-family: 'Syne', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text);
}

.code-meta { font-size: 0.65rem; color: var(--text3); display: flex; gap: 12px; }
.code-meta span { display: flex; align-items: center; gap: 4px; }

pre.code-block {
  background: transparent;
  padding: 20px 24px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  line-height: 1.7;
  overflow-x: auto;
  white-space: pre;
  counter-reset: line;
}

/* Line numbers */
.line {
  display: flex;
  gap: 16px;
}
.ln {
  color: var(--text3);
  font-size: 0.68rem;
  min-width: 32px;
  text-align: right;
  flex-shrink: 0;
  user-select: none;
  padding-top: 1px;
}
.lc { flex: 1; }

/* Syntax colors */
.kw  { color: #60a5fa; font-weight: 500; }
.cls { color: #34d399; }
.str { color: #fb923c; }
.cmt { color: #4b5563; font-style: italic; }
.num { color: #a78bfa; }
.ann { color: #f472b6; }

/* Markdown */
.md-wrap {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 24px 40px;
  max-width: 860px;
  width: 100%;
}

.md-wrap h1 { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; color: var(--text); margin-bottom: 18px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.md-wrap h2 { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 600; color: var(--accent3); margin: 28px 0 12px; }
.md-wrap h3 { font-family: 'Syne', sans-serif; font-size: 1rem; color: var(--accent); margin: 20px 0 8px; }
.md-wrap p  { color: var(--text2); line-height: 1.75; margin-bottom: 14px; font-size: 0.85rem; }
.md-wrap ul, .md-wrap ol { color: var(--text2); padding-left: 20px; margin-bottom: 14px; font-size: 0.83rem; }
.md-wrap li { line-height: 1.7; margin-bottom: 4px; }
.md-wrap code { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; color: var(--accent3); font-size: 0.8rem; }
.md-wrap pre { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; overflow-x: auto; margin-bottom: 18px; }
.md-wrap pre code { background: none; border: none; padding: 0; color: var(--text); font-size: 0.78rem; }
.md-wrap blockquote { border-left: 3px solid var(--accent2); padding-left: 16px; color: var(--text3); margin: 16px 0; font-style: italic; }
.md-wrap table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 0.8rem; }
.md-wrap th { background: var(--surface2); color: var(--text); padding: 8px 12px; border: 1px solid var(--border2); text-align: left; }
.md-wrap td { padding: 7px 12px; border: 1px solid var(--border); color: var(--text2); }
.md-wrap tr:hover td { background: rgba(255,255,255,0.02); }

/* PDF / HTML iframes */
.frame-wrap {
  flex: 1;
  background: var(--bg);
  display: flex;
  flex-direction: column;
}
.frame-wrap iframe {
  flex: 1;
  border: none;
  width: 100%;
  height: 100%;
}

/* Loading spinner */
.loading {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: var(--text3);
  font-size: 0.75rem;
}
.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Status bar */
.statusbar {
  height: 24px;
  background: var(--accent);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 20px;
  font-size: 0.62rem;
  color: rgba(255,255,255,0.85);
  flex-shrink: 0;
}
.statusbar .s-item { display: flex; align-items: center; gap: 5px; }
.statusbar .s-sep  { color: rgba(255,255,255,0.3); }
.statusbar .s-right { margin-left: auto; }

/* Sidebar resize handle */
.resize-handle {
  width: 4px;
  background: transparent;
  cursor: col-resize;
  flex-shrink: 0;
  transition: background 0.2s;
}
.resize-handle:hover { background: var(--accent); }

/* Sidebar logo footer */
.sidebar-logo {
  flex-shrink: 0;
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
}
.sidebar-logo img {
  max-width: 120px;
  width: 100%;
  height: auto;
  opacity: 0.7;
  transition: opacity 0.2s;
}
.sidebar-logo img:hover { opacity: 1; }

</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-sep"></div>
  <div class="breadcrumb" id="breadcrumb">
    <span>workspace</span>
  </div>
  <div class="header-dot"></div>
</header>

<!-- APP -->
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar-panel">
    <div class="sidebar-tree" id="tree-root"></div>
    <div class="sidebar-logo">
      <img src="https://raw.githubusercontent.com/LyPaw/ViMap/main/Logo/logo.png" alt="ViMap logo">
    </div>
  </div>

  <div class="resize-handle" id="resize-handle"></div>

  <!-- VIEWER -->
  <div class="viewer">
    <!-- Tab bar -->
    <div class="tab-bar" id="tab-bar"></div>

    <!-- Content -->
    <div class="content-pane" id="content-pane">
      <div class="welcome" id="welcome-screen">
        <div class="welcome-glyph">⌥</div>
        <h2>ViMap</h2>
        <p>Selecciona un archivo de la barra lateral</p>
      </div>
    </div>
  </div>

</div>

<!-- STATUS BAR -->
<div class="statusbar">
  <div class="s-item">◉ <span id="status-lang">listo</span></div>
  <div class="s-sep">│</div>
  <div class="s-item" id="status-lines">—</div>
  <div class="s-item s-right" id="status-file">ViMap v2.0</div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   FILE TREE  — cargado desde data.json (no tocar este archivo)
   Para añadir archivos edita únicamente: data.json
═══════════════════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════ */
function extOf(name) {
  return name.split('.').pop().toLowerCase();
}

function extBadge(name) {
  const e = extOf(name);
  const map = { java:'ext-java', md:'ext-md', pdf:'ext-pdf', html:'ext-html' };
  const cls = map[e] || '';
  return cls ? `<span class="file-ext ${cls}">.${e}</span>` : '';
}

function langIcon(name) {
  const e = extOf(name);
  const icons = { java:'☕', md:'📝', pdf:'📄', html:'🌐' };
  return icons[e] || '📄';
}

/* ═══════════════════════════════════════════════════════════
   BUILD SIDEBAR TREE
═══════════════════════════════════════════════════════════ */
const treeRoot = document.getElementById('tree-root');

/* Carga data.json y arranca la UI */
fetch('data.json')
  .then(r => {
    if (!r.ok) throw new Error('No se pudo cargar data.json — ' + r.status);
    return r.json();
  })
  .then(fileTree => {
    buildTree(fileTree, treeRoot);
  })
  .catch(err => {
    treeRoot.innerHTML =
      '<div style="padding:16px;color:#ef4444;font-size:0.72rem;">⚠ ' + err.message +
      '<br><br>Asegúrate de que <strong>data.json</strong> está en la misma carpeta que index.html y de que usas un servidor local (no file://).</div>';
  });

function buildTree(data, container, depth = 0, pathParts = []) {
  for (const key in data) {
    const val = data[key];
    const isFiles = Array.isArray(val);
    const currentPath = [...pathParts, key];

    const item = document.createElement('div');
    item.className = 'tree-item';

    const row = document.createElement('div');
    row.className = 'tree-row';
    row.style.paddingLeft = (8 + depth * 14) + 'px';

    if (isFiles) {
      // ── Leaf folder: contains file entries ──────────────
      row.innerHTML = `
        <span class="tree-arrow">▶</span>
        <span class="tree-icon">📂</span>
        <span class="tree-label">${key}</span>
        ${val.length ? `<span style="margin-left:auto;font-size:0.58rem;color:var(--text3)">${val.length}</span>` : ''}
      `;

      const children = document.createElement('div');
      children.className = 'tree-children';

      if (val.length === 0) {
        // Empty folder placeholder
        const empty = document.createElement('div');
        empty.className = 'tree-row';
        empty.style.paddingLeft = (8 + (depth + 1) * 14) + 'px';
        empty.style.color = 'var(--text3)';
        empty.style.fontStyle = 'italic';
        empty.style.fontSize = '0.68rem';
        empty.innerHTML = `<span class="tree-arrow" style="visibility:hidden">▶</span><span>vacío</span>`;
        children.appendChild(empty);
      }

      val.forEach(file => {
        const fItem = document.createElement('div');
        fItem.className = 'tree-item';

        const fRow = document.createElement('div');
        fRow.className = 'tree-row';
        fRow.style.paddingLeft = (8 + (depth + 1) * 14) + 'px';
        fRow.innerHTML = `
          <span class="tree-arrow" style="visibility:hidden">▶</span>
          <span class="tree-icon">${langIcon(file.name)}</span>
          <span class="tree-label">${file.name}</span>
          ${extBadge(file.name)}
        `;
        fRow.addEventListener('click', e => {
          e.stopPropagation();
          openFile(file);
          document.querySelectorAll('.tree-row').forEach(r => r.classList.remove('active'));
          fRow.classList.add('active');
          // Full breadcrumb path
          const crumbHtml = currentPath
            .map((p, i) => i < currentPath.length - 1
              ? `<span>${p}</span><span class="sep">›</span>`
              : `<span>${p}</span>`)
            .join('') + `<span class="sep">›</span><span>${file.name}</span>`;
          document.getElementById('breadcrumb').innerHTML = crumbHtml;
        });

        fItem.appendChild(fRow);
        children.appendChild(fItem);
      });

      row.addEventListener('click', e => { e.stopPropagation(); item.classList.toggle('open'); });
      item.appendChild(row);
      item.appendChild(children);

    } else {
      // ── Branch folder: contains more folders ────────────
      // Detect depth-0 (root subject) vs deeper folders
      const isRoot = depth === 0;
      row.innerHTML = `
        <span class="tree-arrow">▶</span>
        <span class="tree-icon">${isRoot ? '🗂️' : '📁'}</span>
        <span class="tree-label">${key}</span>
      `;

      const children = document.createElement('div');
      children.className = 'tree-children';
      buildTree(val, children, depth + 1, currentPath);

      row.addEventListener('click', e => { e.stopPropagation(); item.classList.toggle('open'); });
      item.appendChild(row);
      item.appendChild(children);
    }

    container.appendChild(item);
  }
}


/* ═══════════════════════════════════════════════════════════
   TABS  —  single slot architecture
   contentPane es el único contenedor; guardamos el DOM node
   de cada pestaña en entry.node para poder intercambiarlo.
═══════════════════════════════════════════════════════════ */
const tabBar      = document.getElementById('tab-bar');
const contentPane = document.getElementById('content-pane');
const welcome     = document.getElementById('welcome-screen');

let tabs = [];        // { file, tabEl, node: HTMLElement|null, loaded: bool }
let activeTab = null;

function openFile(file) {
  const existing = tabs.find(t => t.file.url === file.url);
  if (existing) { activateTab(existing); return; }

  const tabEl = document.createElement('div');
  tabEl.className = 'tab';
  tabEl.innerHTML =
    `<span>${langIcon(file.name)}</span>` +
    `<span>${file.name}</span>` +
    `<span class="tab-close" title="cerrar">✕</span>`;

  const entry = { file, tabEl, node: null, loaded: false };
  tabs.push(entry);

  tabEl.addEventListener('click', e => {
    if (e.target.classList.contains('tab-close')) closeTab(entry);
    else activateTab(entry);
  });

  tabBar.appendChild(tabEl);
  activateTab(entry);
}

function activateTab(entry) {
  if (activeTab) activeTab.tabEl.classList.remove('active');
  activeTab = entry;
  entry.tabEl.classList.add('active');

  welcome.style.display = 'none';

  if (entry.loaded && entry.node) {
    // Swap node into contentPane
    contentPane.innerHTML = '';
    contentPane.appendChild(entry.node);
  } else {
    // Show spinner, then load
    const node = document.createElement('div');
    node.style.cssText = 'display:flex;flex:1;flex-direction:column;overflow:hidden;min-height:0;';
    node.innerHTML = '<div class="loading"><div class="spinner"></div>cargando...</div>';
    entry.node = node;
    contentPane.innerHTML = '';
    contentPane.appendChild(node);
    loadContent(entry);
  }

  document.getElementById('status-file').textContent = entry.file.name;
  document.getElementById('status-lang').textContent = extOf(entry.file.name).toUpperCase();
}

function closeTab(entry) {
  const idx = tabs.indexOf(entry);
  tabs.splice(idx, 1);
  entry.tabEl.remove();

  if (activeTab === entry) {
    activeTab = null;
    if (tabs.length > 0) {
      activateTab(tabs[Math.max(0, idx - 1)]);
    } else {
      contentPane.innerHTML = '';
      welcome.style.display = 'flex';
      document.getElementById('status-file').textContent = 'ViMap v2.0';
      document.getElementById('status-lang').textContent = 'listo';
      document.getElementById('status-lines').textContent = '—';
    }
  }
}

/* ═══════════════════════════════════════════════════════════
   LOAD CONTENT  — escribe dentro de entry.node
═══════════════════════════════════════════════════════════ */
function loadContent(entry) {
  const file = entry.file;
  const node = entry.node;
  const ext  = extOf(file.name);
  entry.loaded = true;

  if (ext === 'md') {
    fetch(file.url)
      .then(r => r.text())
      .then(md => {
        const lines = md.split('\n').length;
        node.innerHTML = '<div class="md-wrap">' + marked.parse(md) + '</div>';
        document.getElementById('status-lines').textContent = lines + ' líneas';
      })
      .catch(() => { node.innerHTML = '<div class="loading">⚠ No se pudo cargar el archivo</div>'; });
  }
  else if (ext === 'pdf') {
    const pdfUrl = 'https://docs.google.com/gview?url=' + encodeURIComponent(file.url.trim()) + '&embedded=true';
    node.innerHTML =
      '<div class="code-header">' +
        '<span class="code-filename">' + file.name + '</span>' +
        '<span class="code-meta"><span>PDF document</span></span>' +
      '</div>' +
      '<div class="frame-wrap"><iframe src="' + pdfUrl + '" allowfullscreen></iframe></div>';
  }
  else if (ext === 'html') {
    fetch(file.url.trim())
      .then(r => r.text())
      .then(html => {
        node.innerHTML =
          '<div class="code-header">' +
            '<span class="code-filename">' + file.name + '</span>' +
            '<div class="code-meta">' +
              '<span>🌐 HTML preview</span>' +
            '</div>' +
          '</div>' +
          '<div class="frame-wrap"></div>';
        const wrap = node.querySelector('.frame-wrap');
        const iframe = document.createElement('iframe');
        iframe.style.cssText = 'flex:1;width:100%;border:none;min-height:0;';
        iframe.srcdoc = html;
        iframe.sandbox = 'allow-scripts allow-same-origin allow-forms';
        wrap.appendChild(iframe);
        document.getElementById('status-lines').textContent = html.split('\n').length + ' líneas';
      })
      .catch(() => { node.innerHTML = '<div class="loading">⚠ No se pudo cargar el HTML. Asegúrate de usar GitHub Pages o servidor local.</div>'; });
  }
  else {
    fetch(file.url.trim())
      .then(r => r.text())
      .then(text => {
        const lines = text.split('\n');
        document.getElementById('status-lines').textContent = lines.length + ' líneas';
        const highlighted = highlightJava(text);
        const linesHtml = highlighted.split('\n').map((l, i) =>
          '<div class="line"><span class="ln">' + (i+1) + '</span><span class="lc">' + (l||' ') + '</span></div>'
        ).join('');
        node.innerHTML =
          '<div class="code-header">' +
            '<span class="code-filename">' + file.name + '</span>' +
            '<div class="code-meta">' +
              '<span>☕ Java</span>' +
              '<span>' + lines.length + ' líneas</span>' +
            '</div>' +
          '</div>' +
          '<div class="code-wrap"><pre class="code-block">' + linesHtml + '</pre></div>';
      })
      .catch(() => { node.innerHTML = '<div class="loading">⚠ No se pudo cargar el archivo</div>'; });
  }
}

/* ═══════════════════════════════════════════════════════════
   SYNTAX HIGHLIGHT (Java)
═══════════════════════════════════════════════════════════ */
function escapeHTML(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlightJava(raw) {
  // Process line by line to avoid regex collisions on HTML-escaped content
  return raw.split('\n').map(function(line) {
    return highlightLine(line);
  }).join('\n');
}

function highlightLine(line) {
  // We work on the RAW line (not yet HTML-escaped), token by token
  var out = '';
  var i = 0;
  var len = line.length;

  while (i < len) {
    // Block comment start (shouldn't span lines after split, but handle /*)
    if (line[i] === '/' && line[i+1] === '*') {
      var end = line.indexOf('*/', i + 2);
      if (end === -1) end = len - 2;
      var tok = line.slice(i, end + 2);
      out += '<span class="cmt">' + esc(tok) + '</span>';
      i = end + 2;
      continue;
    }
    // Line comment
    if (line[i] === '/' && line[i+1] === '/') {
      out += '<span class="cmt">' + esc(line.slice(i)) + '</span>';
      break;
    }
    // String literal "..."
    if (line[i] === '"') {
      var j = i + 1;
      while (j < len && !(line[j] === '"' && line[j-1] !== '\\')) j++;
      var tok = line.slice(i, j + 1);
      out += '<span class="str">' + esc(tok) + '</span>';
      i = j + 1;
      continue;
    }
    // Char literal '.'
    if (line[i] === "'" && i + 2 < len) {
      var j = i + 1;
      while (j < len && !(line[j] === "'" && line[j-1] !== '\\')) j++;
      var tok = line.slice(i, j + 1);
      out += '<span class="str">' + esc(tok) + '</span>';
      i = j + 1;
      continue;
    }
    // Annotation @Xxx
    if (line[i] === '@' && i + 1 < len && /[A-Za-z]/.test(line[i+1])) {
      var j = i + 1;
      while (j < len && /[A-Za-z0-9_]/.test(line[j])) j++;
      out += '<span class="ann">' + esc(line.slice(i, j)) + '</span>';
      i = j;
      continue;
    }
    // Word token (keyword, class name, identifier, number)
    if (/[A-Za-z_$0-9]/.test(line[i])) {
      var j = i;
      while (j < len && /[A-Za-z_$0-9]/.test(line[j])) j++;
      var word = line.slice(i, j);
      var span = tokenSpan(word);
      out += span;
      i = j;
      continue;
    }
    // Everything else: escape and emit
    out += esc(line[i]);
    i++;
  }
  return out;
}

var KEYWORDS = new Set([
  'abstract','assert','boolean','break','byte','case','catch','char','class',
  'const','continue','default','do','double','else','enum','extends','final',
  'finally','float','for','goto','if','implements','import','instanceof','int',
  'interface','long','native','new','null','package','private','protected',
  'public','record','return','sealed','short','static','strictfp','super',
  'switch','this','throw','throws','transient','true','false','try','var',
  'void','volatile','while','permits','String','System','ArrayList','HashMap',
  'HashSet','LinkedList','List','Map','Set'
]);

function tokenSpan(word) {
  if (KEYWORDS.has(word))           return '<span class="kw">'  + esc(word) + '</span>';
  if (/^\d/.test(word))             return '<span class="num">' + esc(word) + '</span>';
  if (/^[A-Z]/.test(word))         return '<span class="cls">' + esc(word) + '</span>';
  return esc(word);
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}


/* ═══════════════════════════════════════════════════════════
   SIDEBAR RESIZE
═══════════════════════════════════════════════════════════ */
const handle  = document.getElementById('resize-handle');
const sidebar = document.getElementById('sidebar-panel');
let resizing = false, startX = 0, startW = 0;

handle.addEventListener('mousedown', e => {
  resizing = true; startX = e.clientX; startW = sidebar.offsetWidth;
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
});
document.addEventListener('mousemove', e => {
  if (!resizing) return;
  const w = Math.max(160, Math.min(520, startW + e.clientX - startX));
  sidebar.style.width = w + 'px';
});
document.addEventListener('mouseup', () => {
  resizing = false;
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
});
</script>
